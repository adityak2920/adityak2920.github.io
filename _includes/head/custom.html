<style>
  html {

    box-shadow:

      inset 0 0 20px rgba(60, 40, 20, 0.04);
    /* paper fold: subtle bottom-right depth shadow */
    filter: drop-shadow(2px 3px 6px rgba(0,0,0,0.18)) drop-shadow(1px 1px 2px rgba(0,0,0,0.10));

    min-height: 100vh;

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(
      ellipse at center,
      transparent 60%,
      rgba(80, 60, 30, 0.06) 100%
